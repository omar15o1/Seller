<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الإعدادات</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
<body>
<div class="lang-switcher" style="text-align:right;padding:8px;">
    <button class="lang-btn" data-lang="en" type="button">EN</button>
    <button class="lang-btn" data-lang="ar" type="button">AR</button>
    <button class="lang-btn" data-lang="fr" type="button">FR</button>
    <button class="lang-btn" data-lang="zh" type="button">中文</button>
    <button class="lang-btn" data-lang="ru" type="button">RU</button>
</div>

    <div class="nav">
        <div class="selector">
            <div class="n">
                <p class="header-p" data-i18n="settings">Settings</p>
                    <a class="nav-a" data-bs-toggle="tab" href="#Account">Account</a>
                    <a class="nav-a" data-bs-toggle="tab" href="#Data">Data</a>
                    <a class="nav-b" data-bs-toggle="tab" href="#Plans">Plans</a>
            </div>
        </div>
    </div>

    <div class="mainI">
        <div class="tab-pane container active" id="Account">
            <div class="account-st">
                <img class="logo" src="src/img/logo.png" alt="">
                <input class="img-u" type="file" accept="image/png, image/jpeg">
                <form class="account-st">
                    <input type="text" placeholder="اسم المستخدم">
                    <input type="email" placeholder="E-mail">
                    <input type="password" id="password" placeholder="password">
                    <input type="date" placeholder="Birthday">
                    <select name="" id="">
                        <option value="gender">gender</option>
                        <option>male</option>
                        <option>female</option>
                    </select>
                    <input class="submit" type="submit" value="Save">
        </div>
        <h2>_________________________________________________________________</h2>
        <div class="tab-pane container fade" id="Data">
            <div class="Data">
                <input type="button" class="download-d" value="تحميل بيانات التاجر">
                <input type="button" class="delete-d" value="حذف جميع البيانات">
                <input type="button" class="upload-d" value="رفع إلى Google Drive">
            </div>

        </div>
        <div class="tab-pane container fade" id="Plans">

        </div>
    </div>
    
<script src="../i18n.js"></script>
</body>
</html>
