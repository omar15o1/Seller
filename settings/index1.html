<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings</title>
    <link rel="stylesheet" href="style.css">
    <script src="js/script.js"></script>
<body>
    <div class="nav">
        <div class="selector">
            <div class="n">
                <p class="header-p">Settings</p>
                    <a class="nav-a" data-bs-toggle="tab" href="#Account">Account</a>
                    <a class="nav-a" data-bs-toggle="tab" href="#Data">Data</a>
                    <a class="nav-b" data-bs-toggle="tab" href="#Plans">Plans</a>
            </div>
        </div>
    </div>

    <div class="mainI">
        <div class="tab-pane container active" id="Account">
            <div class="account-st">
                <img class="logo" src="src/img/logo.png" alt="">
                <input class="img-u" type="file" accept="image/png, image/jpeg">
                <form class="account-st">
                    <input type="text" placeholder="Username">
                    <input type="email" placeholder="E-mail">
                    <input type="password" placeholder="password">
                    <input type="date" placeholder="Birthday">
                    <select name="" id="">
                        <option value="gender">gender</option>
                        <option>male</option>
                        <option>female</option>
                    </select>
                    <input class="submit" type="submit" value="Save">
        </div>
        <h2>_________________________________________________________________</h2>
        <div class="tab-pane container fade" id="Data">
            <div class="Data">
                <input type="button" class="download-d" value="Download Seller data">
                <input type="button" class="delete-d" value="Delete all Seller data">
                <input type="button" class="upload-d" value="Upload on drive">
            </div>

        </div>
        <div class="tab-pane container fade" id="Plans">

        </div>
    </div>
    
</body>
</html>
